<!DOCTYPE HTML>
<!--
	Ut Potes Age | Technology Labs
-->
<html>
	<head>
		<title>Ut Potes Age | Technology Labs</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<meta name="description" content="Ut Potes Age is a private technology firm specializing in software development, proprietary algorithm design, and digital asset management." />
		<link rel="stylesheet" href="assets/css/main.css" />

		<style>
			/* Ut Potes Age refinements */

			body {
				min-height: 100vh;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				text-align: center;
			}

			#header {
				max-width: 760px;
				width: 90%;
				margin: 0 auto;
				padding: 2rem 0;
			}

			#header .eyebrow {
				margin: 0 0 0.85rem 0;
				font-size: 0.72rem;
				letter-spacing: 0.18em;
				text-transform: uppercase;
				opacity: 0.65;
			}

			#header h1 {
				margin-bottom: 1rem;
				letter-spacing: 0.035em;
			}

			#header .intro {
				max-width: 620px;
				margin-left: auto;
				margin-right: auto;
				line-height: 1.7;
				font-size: 1.05rem;
				opacity: 0.88;
			}

			#contact {
				max-width: 560px;
				width: 90%;
				margin: 1.5rem auto 0 auto;
				text-align: center;
			}

			#contact p {
				margin: 0;
				line-height: 1.7;
				opacity: 0.9;
			}

			#contact a {
				border-bottom: dotted 1px;
				text-decoration: none;
			}

			#footer {
				margin-top: 3rem;
			}

			#footer .icons a {
				transition: transform 0.2s ease, opacity 0.2s ease;
			}

			#footer .icons a:hover {
				transform: translateY(-2px);
				opacity: 0.85;
			}

			@media screen and (max-width: 736px) {
				#header {
					width: 92%;
				}

				#header .intro {
					max-width: 100%;
					font-size: 1rem;
				}

				#footer {
					margin-top: 2rem;
				}
			}
		</style>
	</head>

	<body class="is-preload">

		<!-- Header -->
			<header id="header">
				<p class="eyebrow">Private Technology Firm</p>

				<h1>Ut Potes Age</h1>

				<p class="intro">
					Specializing in software development, proprietary algorithm design,
					and digital asset management.
				</p>
			</header>

		<!-- Contact -->
			<section id="contact">
				<p>
					For more information, contact:
					<a href="mailto:team@utpotesage.com">team@utpotesage.com</a>
				</p>
			</section>

		<!-- Footer -->
			<footer id="footer">
				<ul class="icons">
					<li>
						<a href="mailto:team@utpotesage.com" class="icon fa-envelope" aria-label="Email">
							<span class="label">Email</span>
						</a>
					</li>
				</ul>

				<ul class="copyright">
					<li>&copy; Ut Potes Age. All rights reserved.</li>
					<li>Design adapted from <a href="http://html5up.net" target="_blank" rel="noopener noreferrer">HTML5 UP</a></li>
				</ul>
			</footer>

		<!-- Scripts -->
			<script src="assets/js/main.js"></script>

	</body>
</html>
